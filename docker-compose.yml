version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: asst-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_MULTIPLE_DATABASES: auth_db,academic_db,schedule_db,library_db,finance_db,inventory_db,cafe_db,quiz_db,research_db,parking_db
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway-service:
    build:
      context: ./services/gateway-service
      dockerfile: Dockerfile
    container_name: asst-gateway-service
    ports:
      - "5005:5005"
    environment:
      PORT: 5005
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/auth_db?sslmode=disable
      JWT_SECRET: asst-jwt-secret-key-987654321
      ACADEMIC_SERVICE_URL: http://academic-service:8081
      SCHEDULING_SERVICE_URL: http://scheduling-service:8082
      LIBRARY_SERVICE_URL: http://library-service:8083
      FINANCE_SERVICE_URL: http://finance-service:8084
      INVENTORY_SERVICE_URL: http://inventory-service:8085
      CAFE_SERVICE_URL: http://cafe-service:8086
      ASSIGNMENT_QUIZ_SERVICE_URL: http://assignment-quiz-service:8001
      RESEARCH_LAB_SERVICE_URL: http://research-lab-service:8002
      PARKING_ALUMNI_SERVICE_URL: http://parking-alumni-service:8003
      REPORT_SERVICE_URL: http://report-service:8004
    depends_on:
      postgres:
        condition: service_healthy

  academic-service:
    build:
      context: ./services/academic-service
      dockerfile: Dockerfile
    container_name: asst-academic-service
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/academic_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  scheduling-service:
    build:
      context: ./services/scheduling-service
      dockerfile: Dockerfile
    container_name: asst-scheduling-service
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/schedule_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  library-service:
    build:
      context: ./services/library-service
      dockerfile: Dockerfile
    container_name: asst-library-service
    ports:
      - "8083:8083"
    environment:
      PORT: 8083
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/library_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  finance-service:
    build:
      context: ./services/finance-service
      dockerfile: Dockerfile
    container_name: asst-finance-service
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/finance_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: asst-inventory-service
    ports:
      - "8085:8085"
    environment:
      PORT: 8085
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  cafe-service:
    build:
      context: ./services/cafe-service
      dockerfile: Dockerfile
    container_name: asst-cafe-service
    ports:
      - "8086:8086"
    environment:
      PORT: 8086
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/cafe_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  assignment-quiz-service:
    build:
      context: ./services/assignment-quiz-service
      dockerfile: Dockerfile
    container_name: asst-assignment-quiz-service
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/quiz_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  research-lab-service:
    build:
      context: ./services/research-lab-service
      dockerfile: Dockerfile
    container_name: asst-research-lab-service
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/research_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  parking-alumni-service:
    build:
      context: ./services/parking-alumni-service
      dockerfile: Dockerfile
    container_name: asst-parking-alumni-service
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/parking_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  admin-portal:
    build:
      context: ./frontends/admin-portal
      dockerfile: Dockerfile
    container_name: asst-admin-portal
    ports:
      - "3000:3000"
    environment:
      - VITE_API_GATEWAY_URL=http://localhost:5005
    depends_on:
      - gateway-service

  user-portal:
    build:
      context: ./frontends/user-portal
      dockerfile: Dockerfile
    container_name: asst-user-portal
    ports:
      - "3001:3001"
    environment:
      - VITE_API_GATEWAY_URL=http://localhost:5005
    depends_on:
      - gateway-service

  devops-dashboard:
    build:
      context: ./frontends/devops-dashboard
      dockerfile: Dockerfile
    container_name: asst-devops-dashboard
    ports:
      - "3002:3002"
    environment:
      - VITE_API_GATEWAY_URL=http://localhost:5005
    depends_on:
      - gateway-service

  report-service:
    build:
      context: ./services/report-service
      dockerfile: Dockerfile
    container_name: asst-report-service
    ports:
      - "8004:8004"
    environment:
      PORT: 8004
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
